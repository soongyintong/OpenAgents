name: Issue Gate — Contributors and Members Only

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  check-author:
    runs-on: ubuntu-latest
    steps:
      - name: Check if issue author is contributor or member
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const author = issue.user.login;
            const role = issue.author_association;

            const allowed = ['OWNER', 'MEMBER', 'COLLABORATOR'];
            const whitelistedBots = ['clanker-journalist[bot]'];

            if (allowed.includes(role) || whitelistedBots.includes(author)) {
              console.log(`✅ ${author} (${role}) — issue #${issue.number} allowed`);
              return;
            }

            console.log(`❌ ${author} (${role}) — closing issue #${issue.number}`);

            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: issue.number,
              body: `👋 @${author} — This repository only accepts issues from contributors and organization members.\n\nYour role: \`${role}\`\n\nIf you believe this is an error, please reach out to the maintainers.\n\nThis issue has been automatically closed and locked.`,
            });

            await github.rest.issues.update({
              ...context.repo,
              issue_number: issue.number,
              state: 'closed',
            });

            await github.rest.issues.lock({
              ...context.repo,
              issue_number: issue.number,
              lock_reason: 'off-topic',
            });
